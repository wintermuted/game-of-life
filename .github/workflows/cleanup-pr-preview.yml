name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Remove preview directory from gh-pages
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch does not exist; nothing to clean."
            exit 0
          fi

          git fetch origin gh-pages
          git worktree add --detach ./gh-pages-out FETCH_HEAD

          preview_dir="gh-pages-out/previews/pr-${{ github.event.pull_request.number }}"
          if [ ! -d "$preview_dir" ]; then
            echo "No preview directory found for PR #${{ github.event.pull_request.number }}"
            exit 0
          fi

          rm -rf "$preview_dir"

          cd gh-pages-out
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Cleanup preview for PR #${{ github.event.pull_request.number }}"
            git push --force origin HEAD:refs/heads/gh-pages
            echo "Preview cleaned up successfully"
          fi

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const body = `🧹 Preview deployment has been cleaned up.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
